<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DSTSE | Lecture Decision Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f52ba;      /* Sapphire */
            --primary-dark: #0b3d8a;
            --secondary: #f4a261;    /* Warm accent */
            --success: #2e9c4a;
            --warning: #e76f51;
            --danger: #d62828;
            --gray-100: #f8f9fa;
            --gray-200: #e9ecef;
            --gray-700: #495057;
            --gray-900: #212529;
            --shadow: 0 4px 12px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.05);
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f5 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--gray-900);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: -0.01em;
        }
        .header p {
            color: var(--gray-700);
            margin-top: 0.5rem;
            font-size: 1rem;
        }

        /* Card layout */
        .card {
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: var(--transition);
        }

        /* Grid form */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }
        label {
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--gray-700);
        }
        input, select {
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
            background-color: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15,82,186,0.1);
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }
        button:hover {
            background-color: var(--primary-dark);
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background-color: var(--gray-200);
            color: var(--gray-700);
            cursor: not-allowed;
        }

        /* Result area */
        .result-card {
            background: var(--gray-100);
            border-left: 4px solid var(--primary);
        }
        .decision-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .decision-scheduled { background: var(--success); color: white; }
        .decision-online { background: var(--secondary); color: white; }
        .decision-rescheduled { background: var(--warning); color: white; }
        .decision-cancelled { background: var(--danger); color: white; }

        .probabilities {
            margin: 1rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .prob-item {
            flex: 1;
            min-width: 100px;
            background: white;
            padding: 0.5rem;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .prob-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 500;
            color: var(--gray-700);
        }
        .prob-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary);
        }
        .explanation {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--gray-700);
        }

        /* Loading spinner */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .card {
                padding: 1rem;
            }
        }

        .error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 DSTSE</h1>
        <p>Intelligent Lecture Decision Support – Weather · Traffic · Bayesian Reasoning · Policy Enforcement</p>
    </div>

    <div class="card">
        <form id="lectureForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="datetime">Date & Time</label>
                    <input type="datetime-local" id="datetime" name="datetime" required>
                </div>
                <div class="form-group">
                    <label for="road">Road / Location</label>
                    <select id="road" name="road" required>
                        <option value="">-- Select road --</option>
                        <option value="Bombo Road">Bombo Road</option>
                        <option value="Northern Bypass">Northern Bypass</option>
                        <option value="Sir Apolo Road">Sir Apolo Road</option>
                        <option value="University Road">University Road</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="dry_bulb">Dry Bulb Temp (°C)</label>
                    <input type="number" step="0.1" id="dry_bulb" name="dry_bulb" value="25.0" required>
                </div>
                <div class="form-group">
                    <label for="wet_bulb">Wet Bulb Temp (°C)</label>
                    <input type="number" step="0.1" id="wet_bulb" name="wet_bulb" value="20.0" required>
                </div>
                <div class="form-group">
                    <label for="humidity">Humidity (%)</label>
                    <input type="number" step="1" id="humidity" name="humidity" value="70" required>
                </div>
                <div class="form-group">
                    <label for="wind_speed">Wind Speed (m/s)</label>
                    <input type="number" step="0.5" id="wind_speed" name="wind_speed" value="5.0" required>
                </div>
                <div class="form-group">
                    <label for="importance">Importance</label>
                    <select id="importance" name="importance">
                        <option value="Normal">Normal</option>
                        <option value="Important">Important</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 1.5rem;">
                <button type="submit" id="submitBtn">Get Decision</button>
            </div>
        </form>
    </div>

    <div id="resultContainer" style="display: none;">
        <div class="card result-card">
            <div id="decisionBadge" class="decision-badge"></div>
            <h3 style="margin-bottom: 0.5rem;">📊 Probabilities</h3>
            <div id="probabilities" class="probabilities"></div>
            <h3 style="margin-bottom: 0.5rem;">💡 Explanation</h3>
            <div id="explanation" class="explanation"></div>
        </div>
    </div>

    <div id="errorContainer" style="display: none;">
        <div class="card" style="background: #fee; border-left-color: var(--danger);">
            <p style="color: var(--danger); font-weight: 500;">⚠️ Error</p>
            <p id="errorMessage"></p>
        </div>
    </div>
</div>

<script>
    // Set default datetime to now (rounded to nearest hour)
    const now = new Date();
    now.setMinutes(0,0,0);
    const datetimeLocal = now.toISOString().slice(0,16);
    document.getElementById('datetime').value = datetimeLocal;

    const form = document.getElementById('lectureForm');
    const submitBtn = document.getElementById('submitBtn');
    const resultContainer = document.getElementById('resultContainer');
    const errorContainer = document.getElementById('errorContainer');

    // Helper to format probabilities
    function renderProbabilities(probs) {
        const container = document.getElementById('probabilities');
        container.innerHTML = '';
        for (const [key, value] of Object.entries(probs)) {
            const div = document.createElement('div');
            div.className = 'prob-item';
            div.innerHTML = `
                <div class="prob-label">${key}</div>
                <div class="prob-value">${(value * 100).toFixed(1)}%</div>
            `;
            container.appendChild(div);
        }
    }

    // Helper to set decision badge style
    function setDecisionBadge(decision) {
        const badge = document.getElementById('decisionBadge');
        badge.textContent = decision;
        // Remove existing classes
        badge.className = 'decision-badge';
        if (decision === 'Scheduled') badge.classList.add('decision-scheduled');
        else if (decision === 'Online') badge.classList.add('decision-online');
        else if (decision === 'Rescheduled') badge.classList.add('decision-rescheduled');
        else if (decision === 'Cancelled') badge.classList.add('decision-cancelled');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Gather data
        const payload = {
            datetime: document.getElementById('datetime').value,
            road_name: document.getElementById('road').value,
            dry_bulb: parseFloat(document.getElementById('dry_bulb').value),
            wet_bulb: parseFloat(document.getElementById('wet_bulb').value),
            humidity: parseFloat(document.getElementById('humidity').value),
            wind_speed: parseFloat(document.getElementById('wind_speed').value),
            importance: document.getElementById('importance').value
        };

        // Basic validation
        if (!payload.road_name) {
            alert('Please select a road.');
            return;
        }

        // Show loading state
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loader"></span> Computing...';
        resultContainer.style.display = 'none';
        errorContainer.style.display = 'none';

        try {
            const response = await fetch('http://localhost:82/predict_decision', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Server responded with ${response.status}: ${errorText}`);
            }

            const data = await response.json();
            // Display results
            setDecisionBadge(data.decision);
            renderProbabilities(data.probabilities);
            document.getElementById('explanation').innerHTML = data.explanation;
            resultContainer.style.display = 'block';
        } catch (err) {
            errorContainer.style.display = 'block';
            document.getElementById('errorMessage').innerHTML = err.message;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Get Decision';
        }
    });
</script>
</body>
</html>
