server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Handle SPA routing (if client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Proxy API requests to decision service
    location /api/ {
        proxy_pass http://src-decision-1:7860/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}